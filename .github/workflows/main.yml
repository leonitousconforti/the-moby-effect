name: CI

on:
  push:
    branches: ["main", "ci/bun-deno"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typescript-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: lts/*
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm check
      - run: pnpm lint
      - run: pnpm circular
      - run: pnpm build

  docker-engine-tests:
    needs: [typescript-build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        config:
          [
            { platform: "bun", variant: "bun" },
            { platform: "bun", variant: "bun-undici" },
            { platform: "deno", variant: "deno" },
            { platform: "deno", variant: "deno-undici" },
            { platform: "22.x", variant: "node-22.x" },
            { platform: "22.x", variant: "node-22.x-undici" },
            { platform: "24.x", variant: "node-24.x" },
            { platform: "24.x", variant: "node-24.x-undici" },
            { platform: "26.x", variant: "node-26.x" },
            { platform: "26.x", variant: "node-26.x-undici" },
          ]
    env:
      __PLATFORM_VARIANT: ${{ matrix.config.variant }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Disable AppArmor restriction (globally 🤮) on unprivileged user namespaces to allow rootless Docker to work
      - run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          echo 'kernel.apparmor_restrict_unprivileged_userns=0' | sudo tee /etc/sysctl.d/99-rootless-docker.conf
          sudo sysctl --system

      # Anonymous Docker Hub pulls from shared runners regularly hit rate
      # limits, and every matrix job needs the same images - cache them as a
      # tarball and only pull (with retries) on a cache miss. Keep the image
      # list in sync with the testMatrix in test/shared-global.ts, which is
      # also what the cache key watches.
      - name: Restore docker images
        id: docker-images
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/docker-image-cache
          key: docker-images-v1-${{ hashFiles('test/shared-global.ts') }}

      - name: Load cached docker images
        if: steps.docker-images.outputs.cache-hit == 'true'
        run: docker load --input /tmp/docker-image-cache/images.tar

      - name: Pull docker images
        if: steps.docker-images.outputs.cache-hit != 'true'
        run: |
          docker pull docker.io/library/docker:dind-rootless
          docker pull docker.io/library/docker:23-dind-rootless
          docker pull docker.io/library/docker:24-dind-rootless
          docker pull docker.io/library/docker:25-dind-rootless
          docker pull docker.io/library/docker:26-dind-rootless
          docker pull docker.io/library/docker:27-dind-rootless
          docker pull docker.io/library/docker:28-dind-rootless
          docker pull docker.io/library/alpine:latest
          docker pull docker.io/library/ubuntu:latest
          mkdir -p /tmp/docker-image-cache
          docker save --output /tmp/docker-image-cache/images.tar \
            docker.io/library/docker:dind-rootless \
            docker.io/library/docker:23-dind-rootless \
            docker.io/library/docker:24-dind-rootless \
            docker.io/library/docker:25-dind-rootless \
            docker.io/library/docker:26-dind-rootless \
            docker.io/library/docker:27-dind-rootless \
            docker.io/library/docker:28-dind-rootless \
            docker.io/library/alpine:latest \
            docker.io/library/ubuntu:latest

      - name: Generate test fixtures
        run: |
          docker save --output test/fixtures/alpine_latest.tar alpine:latest
          docker save --output test/fixtures/ubuntu_latest.tar ubuntu:latest

      - if: startsWith(matrix.config.variant, 'node')
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ matrix.config.platform }}
      - if: startsWith(matrix.config.variant, 'node')
        run: |
          PNPM_BIN=$(which pnpm)
          sudo -E $PNPM_BIN test

      - if: startsWith(matrix.config.variant, 'bun')
        uses: ./.github/actions/setup-bun
      - if: startsWith(matrix.config.variant, 'bun')
        run: |
          BUN_BIN=$(which bun)
          sudo -E $BUN_BIN x --bun vitest run

      - if: startsWith(matrix.config.variant, 'deno')
        uses: ./.github/actions/setup-deno
      - if: startsWith(matrix.config.variant, 'deno')
        run: |
          DENO_BIN=$(which deno)
          sudo -E $DENO_BIN task test

      # The junit report is the post-mortem for a failed run - upload it even
      # (especially) when the tests fail.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results-${{ matrix.config.variant }}
          path: coverage/junit.xml
          if-no-files-found: ignore
          retention-days: 14
