name: "Setup Node"
description: "Setup Node"

inputs:
  node-version:
    description: "Node.js version"
    required: true
    default: "20.x"

runs:
  using: "composite"
  steps:
    # pnpm must be on the PATH before setup-node can resolve the pnpm store
    # location for its dependency cache.
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"

    - run: pnpm install
      shell: bash
